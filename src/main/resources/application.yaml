spring:
  application:
    name: media_tracker

  datasource:
    url: jdbc:postgresql://localhost:5432/anime_tracker_db
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
